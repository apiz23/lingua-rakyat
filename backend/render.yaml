services:
  - type: web
    name: lingua-rakyat-backend
    runtime: python
    pythonVersion: 3.12.0
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: documents
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_PROVIDER
        value: groq
